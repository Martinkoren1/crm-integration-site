name: Deploy to freehostia via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp
        run: |
          lftp -c "
            set ftp:passive-mode true;
            set ssl:verify-certificate false;
            set ftp:ssl-allow true;
            open -u markor16,${{ secrets.FTP_PASSWORD }} ftp.freehostia.com;
            mirror -R --parallel=2 --no-perms --exclude-glob .git/ --exclude-glob .github/ ./ /www/crm-integration.co.il/;
            quit
          "
